name: FixitSays
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  FixitSays:
    type: application
    platform: iOS
    sources:
      - path: FixitSays
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fixitsaysapp
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: FixitSays/Info.plist
        CODE_SIGN_ENTITLEMENTS: FixitSays/FixitSays.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FixitSaysTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FixitSaysTests
      - path: FixitSays.storekit
    dependencies:
      - target: FixitSays
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fixitsaysapp.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FixitSaysUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FixitSaysUITests
    dependencies:
      - target: FixitSays
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fixitsaysapp.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  FixitSays:
    build:
      targets:
        FixitSays: all
        FixitSaysTests: [test]
        FixitSaysUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: FixitSays.storekit
    test:
      config: Debug
      storeKitConfiguration: FixitSays.storekit
      targets:
        - FixitSaysTests
        - FixitSaysUITests
    archive:
      config: Release
